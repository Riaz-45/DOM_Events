<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Dom Doma dom Events</h1>
    <!-- Option 1 for event handler -->
    <button onclick="console.log(7)">Click me</button>
    <button onclick="console.log(67)">another click</button>
    <button onclick="console.log('I am clicked')">Third Button</button>
    <input type="text" name="text" id="">
    <br>
    <!-- Option 2 for event handler -->
    <button onclick="makeYellow()">Make Yellow</button>
    <button onclick="makeRed()">Make Red</button>
    <br>
    <!-- option 3: get element by id and then set onclick to a function -->
    <button id="btn-make-lightGreen">Make LightGreen</button>
    <button id="btn-make-pink">Make Pink</button>
    <button id="btn-make-brown">make brown</button>
    <button id="btn-make-red">make red</button>
    <br>
    <!-- option 4: addEventListener -->
     <button id="btn-make-aqua">make aqua</button>
     <button id="btn-make-skyblue">make skyBlue</button>

    <script>
        // document.getElementById('give-ID').addEventListener('event type', handler function);
        document.getElementById('btn-make-aqua').addEventListener('click', function makeAqua(){
            document.body.style.backgroundColor = 'aqua';
        })

        document.getElementById('btn-make-skyblue').addEventListener('click', function makeSkyblue(){
            document.body.style.backgroundColor = 'skyblue';
        })
    </script>
    

    <script src="events.js"></script>
</body>
</html>
